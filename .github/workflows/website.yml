name: Publish website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: cheroliv/engine
          path: engine/

      - uses: actions/checkout@v4
        with:
          repository: cheroliv/office
          path: office/

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Write site.yml from secret
        env:
          SITE_YML: ${{ secrets.BAKERY_GRADLE_PLUGIN }}
        run: echo "$SITE_YML" > "office/sites/magic-stick/site.yml"

      - name: Publish website via engine
        run: OFFICE_PATH="$GITHUB_WORKSPACE/office" ./gradlew -PsiteName=magic-stick -q -s publishSite
        working-directory: engine/